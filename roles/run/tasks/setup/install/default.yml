# Install: Manage basic resource setup, such as packages or service users.

---

- name: "Setup | Install | Default | Remove unwanted packages (e.g., to prevent conflicts or resolve incompatibilities)"
  ansible.builtin.package:
    name: "{{ __run_apache_httpd_packages_removal }}"
    state: "absent"
  when:
    - __run_apache_httpd_packages_removal is ansible.builtin.defined
    - (__run_apache_httpd_packages_removal | ansible.builtin.length) > 0


- name: "Setup | Install | Default | Install or upgrade packages"
  ansible.builtin.package:
    name: "{{ __run_apache_httpd_packages_install }}"
    state: "{{ 'latest' if run_apache_httpd_autoupgrade else 'present' }}"
  when:
    - __run_apache_httpd_packages_install is ansible.builtin.defined
    - (__run_apache_httpd_packages_install | ansible.builtin.length) > 0


- name: "Setup | Install | Default | Warn about enabled modules not in platform mapping"
  ansible.builtin.debug:
    msg: >-
      The following modules in 'run_apache_httpd_modules_enabled' are not present in
      this platform's module resource mapping and will be skipped by this role.
      Manage them with your own tasks if needed:
      {{ __run_apache_httpd_unmanaged_modules | ansible.builtin.join(', ') }}
  vars:
    __run_apache_httpd_unmanaged_modules: >-
      {{
        __run_apache_httpd_effective_modules_enabled
        | ansible.builtin.default([])
        | ansible.builtin.reject('in', __run_apache_httpd_modules_map_resources.keys() | ansible.builtin.list)
        | ansible.builtin.list
      }}
  when:
    - (__run_apache_httpd_unmanaged_modules | ansible.builtin.length) > 0


- name: "Setup | Install | Default | Show enabled modules requiring additional packages"
  ansible.builtin.debug:
    msg: >-
      {{
        __run_apache_httpd_effective_modules_enabled
        | ansible.builtin.default([])
        | ansible.builtin.select('in', __run_apache_httpd_modules_map_resources.keys() | list)
        | ansible.builtin.list
      }}
    verbosity: 4


- name: "Setup | Install | Default | Install module-specific packages"
  ansible.builtin.package:
    name: "{{ __run_apache_httpd_modules_map_resources[item]['packages'] }}"
    state: "{{ 'latest' if run_apache_httpd_autoupgrade else 'present' }}"
  when:
    - (__run_apache_httpd_modules_map_resources[item]['packages'] | ansible.builtin.length) > 0
  loop: >-
    {{
      __run_apache_httpd_effective_modules_enabled
      | ansible.builtin.default([])
      | ansible.builtin.select('in', __run_apache_httpd_modules_map_resources.keys() | list)
      | ansible.builtin.list
    }}


- name: "Setup | Install | Default | Remove unwanted files and directories (e.g., to prevent conflicts or resolve incompatibilities)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "absent"
  when:
    - __run_apache_httpd_paths_removal is ansible.builtin.defined
    - (__run_apache_httpd_paths_removal | ansible.builtin.length) > 0
  loop: "{{ __run_apache_httpd_paths_removal }}"


- name: "Setup | Install | Default | Neutralize distribution config files (overwrite to survive package updates)"
  ansible.builtin.copy:
    dest: "{{ item['key'] }}"
    content: |
      {{ item['value'] }} Managed by Ansible (foundata.apache_httpd.run)
      {{ item['value'] }}
      {{ item['value'] }} Content intentionally cleared. The original distribution file conflicted
      {{ item['value'] }} with configuration managed by the foundata.apache_httpd.run role.
      {{ item['value'] }}
      {{ item['value'] }} To restore the original file content, reinstall the owning package:
      {% if (ansible_facts['os_family'] | ansible.builtin.lower) == 'debian' %}
      {{ item['value'] }}   dpkg -S '{{ item['key'] }}'"  # find the package that owns this file
      {{ item['value'] }}   apt-get install --reinstall <package>  # reinstall it to restore the original
      {% elif (ansible_facts['os_family'] | ansible.builtin.lower) == 'suse' %}
      {{ item['value'] }}   rpm -qf '{{ item['key'] }}'  # find the package that owns this file
      {{ item['value'] }}   zypper install --force <package>  # reinstall it to restore the original
      {% elif (ansible_facts['os_family'] | ansible.builtin.lower) == 'redhat' %}
      {{ item['value'] }}   rpm -qf '{{ item['key'] }}'  # find the package that owns this file
      {{ item['value'] }}   dnf reinstall <package>  # reinstall it to restore the original
      {% else %}
      {{ item['value'] }}   Use your package manager to find the owning package and reinstall it.
      {% endif %}
    owner: "root"
    group: "root"
    mode: "0644"
  when:
    - __run_apache_httpd_paths_neutralize is ansible.builtin.defined
    - (__run_apache_httpd_paths_neutralize | ansible.builtin.length) > 0
  loop: "{{ __run_apache_httpd_paths_neutralize | ansible.builtin.dict2items }}"
  loop_control:
    label: "{{ item['key'] }}"
