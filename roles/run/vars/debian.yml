# Internal role variables specific to: Debian (os_family or distribution)
#
# Only values specific to the platform and its functionality should be included
# here. Variables in this file override those defined in vars/main.yml.

---

# List of package names to be installed when run_apache_httpd_state is
# set to "present".
__run_apache_httpd_packages_install:
  - "apache2"
  - "apache2-utils"

# Remove distribution config files that conflict with the role's managed config.
# - security.conf: overrides ServerTokens/ServerSignature from our baseline
# - other-vhosts-access-log.conf: adds duplicate CustomLog for VHosts
__run_apache_httpd_paths_removal:
  - "/etc/apache2/conf-enabled/security.conf"
  - "/etc/apache2/conf-enabled/other-vhosts-access-log.conf"


# Main configuration file path. Debian uses "apache2.conf" instead of
# "httpd.conf".
__run_apache_httpd_config_service_file_path: "/etc/apache2/apache2.conf"

# Config test command.
__run_apache_httpd_config_test_cmd: "apache2ctl configtest"

# Service user and group.
__run_apache_httpd_service_user: "www-data"
__run_apache_httpd_service_group: "www-data"


# Snippet settings overrides.
__run_apache_httpd_snippet_settings_overwrite:
  tls-baseline:
    ssl_session_cache: "shmcb:${APACHE_RUN_DIR}/ssl_scache(10485760)"


# Essential modules: These are the modules Debian enables by default after a
# fresh Apache2 installation. They are required for basic Apache HTTPD operation
# and are always included in the effective modules list regardless of user
# configuration. The cleanup of unmanaged modules will never remove these.
# The MPM module is added automatically based on run_apache_httpd_mpm and does
# not appear here.
__run_apache_httpd_modules_essential:
  - "access_compat"
  - "alias"
  - "auth_basic"
  - "authn_core"
  - "authn_file"
  - "authz_core"
  - "authz_host"
  - "authz_user"
  - "autoindex"
  - "deflate"
  - "dir"
  - "env"
  - "filter"
  - "mime"
  - "negotiation"
  - "reqtimeout"
  - "setenvif"
  - "status"


# Module mapping: Debian uses symlinks from mods-available/ to mods-enabled/.
# Each module can have a .load file (LoadModule directive) and optionally a
# .conf file (module configuration). Both ship with the apache2 package for
# built-in modules. External modules require separate package installation.
#
# conf_files entries:
#   type: "symlink" — create symlink from mods-available/ to mods-enabled/
#   target: relative path from mods-enabled/ to the file in mods-available/
__run_apache_httpd_modules_map_resources:
  # --- Core / built-in modules (ship with apache2 package) ---
  access_compat:
    packages: []
    conf_files:
      - name: "access_compat.load"
        type: "symlink"
        target: "../mods-available/access_compat.load"
  alias:
    packages: []
    conf_files:
      - name: "alias.load"
        type: "symlink"
        target: "../mods-available/alias.load"
      - name: "alias.conf"
        type: "symlink"
        target: "../mods-available/alias.conf"
