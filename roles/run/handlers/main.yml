# Handlers: Tasks that are triggered and run only when notified.

---

- name: "Handlers | Validate Apache HTTPD configuration"
  ansible.builtin.command:
    argv:
      - "/bin/sh"
      - "-c"
      - "{{ __run_apache_httpd_config_test_cmd }}"
  register: __run_apache_httpd_validation_result
  changed_when:
    - false
  failed_when:
    - __run_apache_httpd_validation_result is ansible.builtin.failed
  listen:
    - "run_apache_httpd: validate configuration"


- name: "Handlers | Apache HTTPD service restart"
  ansible.builtin.systemd_service:
    name: "{{ __run_apache_httpd_apache_httpd_servicename }}"
    state: "restarted"
  when:
    - run_apache_httpd_service_state != 'unmanaged'
  listen:
    - "run_apache_httpd: restart apache_httpd.service"


- name: "Handlers | Apache HTTPD service reload"
  ansible.builtin.systemd_service:
    name: "{{ __run_apache_httpd_apache_httpd_servicename }}"
    state: "reloaded"
  when:
    - run_apache_httpd_service_state != 'unmanaged'
  listen:
    - "run_apache_httpd: reload apache_httpd.service"


- name: "Handlers | systemd daemon-reload"
  ansible.builtin.systemd_service:
    daemon_reload: true
  listen: "run_apache_httpd: systemd daemon-reload"
