## Baseline directives in main config

- name: "Molecule | Verify | Read main configuration file content"
  ansible.builtin.slurp:
    src: "{{ __run_apache_httpd_config_service_file_path }}"
  register: __testing_main_config_content


- name: "Molecule | Verify | Decode main configuration file content"
  ansible.builtin.set_fact:
    __testing_main_config: "{{ __testing_main_config_content['content'] | ansible.builtin.b64decode }}"


- name: "Molecule | Verify | Assert baseline directives are present in main config"
  ansible.builtin.assert:
    that:
      - __testing_main_config is ansible.builtin.search('ServerTokens ProductOnly')
      - __testing_main_config is ansible.builtin.search('ServerSignature Off')
      - __testing_main_config is ansible.builtin.search('TraceEnable Off')
      - __testing_main_config is ansible.builtin.search('KeepAlive On')
      - __testing_main_config is ansible.builtin.search('Ansible managed')
    fail_msg: >-
      One or more expected baseline directives are missing from the main configuration.
    success_msg: >-
      All expected baseline directives (ServerTokens, ServerSignature, TraceEnable,
      KeepAlive, Ansible managed) are present in the main configuration.


