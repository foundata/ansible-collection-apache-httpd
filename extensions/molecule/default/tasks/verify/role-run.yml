## Response headers: Apache version information

- name: "Molecule | Verify | Connect to example.com and inspect response headers"
  ansible.builtin.uri:
    url: "http://localhost/"
    headers:
      Host: "example.com"
    return_content: false
  register: __testing_headers_result


- name: "Molecule | Verify | Assert response headers do not contain Apache version information"
  ansible.builtin.assert:
    that:
      - __testing_headers_result['server'] is not ansible.builtin.search('Apache/[0-9]')
    fail_msg: >-
      The response headers contain Apache version information in the Server header.
      Server header value: '{{ __testing_headers_result['server'] | default('') }}'
    success_msg: >-
      The response headers do not contain Apache version information.


