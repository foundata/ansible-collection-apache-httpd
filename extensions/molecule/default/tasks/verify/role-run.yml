## Module configuration (symlink type, Debian only)

- name: "Molecule | Verify | Verify module config files in modules-enabled (Debian)"
  when:
    - (run_apache_httpd_modules_enabled | ansible.builtin.default([]) | ansible.builtin.length) > 0
    - (ansible_facts['os_family'] | ansible.builtin.lower) == 'debian'
  block:

    - name: "Molecule | Verify | Build flat list of expected module conf_files entries"
      ansible.builtin.set_fact:
        __testing_module_conf_entries: >-
          {{
            run_apache_httpd_modules_enabled
            | ansible.builtin.default([])
            | ansible.builtin.select('in', __run_apache_httpd_modules_map_resources.keys() | ansible.builtin.list)
            | ansible.builtin.map('extract', __run_apache_httpd_modules_map_resources)
            | ansible.builtin.map(attribute='conf_files')
            | ansible.builtin.flatten
            | ansible.builtin.unique(attribute='name')
            | ansible.builtin.list
          }}


    - name: "Molecule | Verify | Check module config files in modules-enabled"
      ansible.builtin.stat:
        path: "{{ __run_apache_httpd_config_service_dropin_modules_enabled_dir_path }}/{{ item['name'] }}"
      register: __testing_module_enabled_files
      when:
        - (__testing_module_conf_entries | ansible.builtin.length) > 0
      loop: "{{ __testing_module_conf_entries }}"
      loop_control:
        label: "{{ item['name'] }}"


    - name: "Molecule | Verify | Assert module config files exist in modules-enabled with correct type"
      ansible.builtin.assert:
        that:
          - item['stat']['exists']
          - >-
            item['item']['type'] != 'symlink'
            or item['stat']['islnk']
        fail_msg: >-
          Module config '{{ item['item']['name'] }}' does not exist or has
          wrong type in
          '{{ __run_apache_httpd_config_service_dropin_modules_enabled_dir_path }}/'.
        success_msg: >-
          Module config '{{ item['item']['name'] }}' exists in
          modules-enabled with correct type.
      when:
        - (__testing_module_conf_entries | ansible.builtin.length) > 0
      loop: "{{ __testing_module_enabled_files['results'] | ansible.builtin.default([]) }}"
      loop_control:
        label: "{{ item['item']['name'] | ansible.builtin.default('n/a') }}"


