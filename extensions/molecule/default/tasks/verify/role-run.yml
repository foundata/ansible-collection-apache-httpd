## HTTP connectivity: example.com

- name: "Molecule | Verify | Connect to example.com on HTTP port 80"
  ansible.builtin.uri:
    url: "http://localhost/"
    headers:
      Host: "example.com"
    return_content: true
  register: __testing_http_example_result


- name: "Molecule | Verify | Assert example.com HTTP response contains expected content and status"
  ansible.builtin.assert:
    that:
      - __testing_http_example_result['status'] == 200
      - "'It works!' in __testing_http_example_result['content']"
    fail_msg: >-
      The HTTP response from example.com on port 80 did not return HTTP 200
      or does not contain the expected content.
      Status: {{ __testing_http_example_result['status'] }}
    success_msg: >-
      The HTTP response from example.com on port 80 returned HTTP 200
      and contains the expected content.


## HTTPS connectivity: example.com

- name: "Molecule | Verify | Connect to example.com on HTTPS port 443 (status)"
  # The command module is used intentionally:
  # ansible.builtin.uri sends the URL hostname as TLS SNI, which may not
  # match the server_name. Curl's --resolve flag allows setting the correct
  # SNI for example.com while connecting to 127.0.0.1.
  ansible.builtin.command:
    argv:
      - "curl"
      - "--silent"
      - "--output"
      - "/dev/null"
      - "--write-out"
      - "%{http_code}"
      - "--max-time"
      - "5"
      - "--insecure"
      - "--resolve"
      - "example.com:443:127.0.0.1"
      - "https://example.com/"
  changed_when:
    - false
  failed_when:
    - __testing_https_example_status is ansible.builtin.failed
  register: __testing_https_example_status


- name: "Molecule | Verify | Connect to example.com on HTTPS port 443 (body)"
  # The command module is used intentionally:
  # see the status check task above for the reasoning.
  ansible.builtin.command:
    argv:
      - "curl"
      - "--silent"
      - "--max-time"
      - "5"
      - "--insecure"
      - "--resolve"
      - "example.com:443:127.0.0.1"
      - "https://example.com/"
  changed_when:
    - false
  failed_when:
    - __testing_https_example_body is ansible.builtin.failed
  register: __testing_https_example_body


- name: "Molecule | Verify | Assert example.com HTTPS response contains expected content and status"
  ansible.builtin.assert:
    that:
      - __testing_https_example_status['stdout'] == '200'
      - "'It works!' in __testing_https_example_body['stdout']"
    fail_msg: >-
      The HTTPS response from example.com on port 443 did not return HTTP 200
      or does not contain the expected content.
      Status: {{ __testing_https_example_status['stdout'] }}
    success_msg: >-
      The HTTPS response from example.com on port 443 returned HTTP 200
      and contains the expected content.


