# Check collection role "run" outcomes.

- name: "Molecule | Verify | Initialize the foundata.apache_httpd.run role (without actually running it; get and expose variables)"
  ansible.builtin.include_role:
    name: "foundata.apache_httpd.run"
    tasks_from: "init"
    public: true


## Preparation

- name: "Molecule | Verify | Set run_apache_httpd_* parameters as facts from __testing_state"
  ansible.builtin.set_fact:
    "{{ item['key'] }}": "{{ item['value'] }}"
  loop: >-
    {{
      (__testing_state | default({}, true))
      | ansible.builtin.dict2items
      | ansible.builtin.selectattr('key', 'match', '^run_apache_httpd_')
      | ansible.builtin.list
    }}


- name: "Molecule | Verify | Set __testing_* parameters as facts from __testing_state"
  ansible.builtin.set_fact:
    "{{ item['key'] }}": "{{ item['value'] }}"
  loop: >-
    {{
      (__testing_state | default({}, true))
      | ansible.builtin.dict2items
      | ansible.builtin.selectattr('key', 'match', '^__testing_')
      | ansible.builtin.list
    }}


## Main configuration file existence

- name: "Molecule | Verify | Check if Apache HTTPD main configuration file exists"
  ansible.builtin.stat:
    path: "{{ __run_apache_httpd_config_service_file_path }}"
  register: __testing_config_file


- name: "Molecule | Verify | Assert Apache HTTPD main configuration file exists"
  ansible.builtin.assert:
    that:
      - __testing_config_file['stat']['exists']
    fail_msg: >-
      The Apache HTTPD main configuration file '{{ __run_apache_httpd_config_service_file_path }}'
      does not exist.
    success_msg: >-
      The Apache HTTPD main configuration file '{{ __run_apache_httpd_config_service_file_path }}'
      exists.


